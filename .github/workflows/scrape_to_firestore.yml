name: Scrape METU NCC -> Firestore

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 18:00 UTC (Turkey is UTC+3; this is 21:00 TR)
    - cron: "0 18 * * 1"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          FIREBASE_SA_B64: ${{ secrets.FIREBASE_SA_B64 }}
        run: |
          python scraper.py