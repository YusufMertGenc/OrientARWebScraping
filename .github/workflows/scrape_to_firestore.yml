name: Scrape METU NCC -> Firestore

on:
  workflow_dispatch:
  schedule:
    # Monday 16:00 Bucharest
    - cron: "0 14 * * 1"

    # Monday 20:00 Bucharest
    - cron: "0 18 * * 1"

    # Tuesday 15:00 Bucharest
    - cron: "0 13 * * 2"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          FIREBASE_SA_B64: ${{ secrets.FIREBASE_SA_B64 }}
        run: |
          python scraper.py