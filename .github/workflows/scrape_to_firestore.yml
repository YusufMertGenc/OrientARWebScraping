name: Scrape METU NCC -> Firestore

on:
  workflow_dispatch:
  schedule:
    # Monday
    - cron: "0 9 * * 1"   # 12:00
    - cron: "0 10 * * 1"  # 13:00
    - cron: "0 11 * * 1"  # 14:00
    - cron: "0 13 * * 1"  # 16:00
    - cron: "0 15 * * 1"  # 18:00
    - cron: "0 18 * * 1"  # 21:00

    # Tuesday
    - cron: "0 6 * * 2"   # 09:00
    - cron: "0 8 * * 2"   # 11:00
    - cron: "0 9 * * 2"   # 12:00
    - cron: "0 13 * * 2"  # 16:00

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          FIREBASE_SA_B64: ${{ secrets.FIREBASE_SA_B64 }}
        run: |
          python scraper.py
